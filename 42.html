<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastListPro Has Relaunched — Join the Revolution</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:#07040f;color:#e8e4f0;overflow-x:hidden;min-height:100vh}

/* ── Animated starfield background ── */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.stars span{position:absolute;border-radius:50%;background:#ffd700;animation:twinkle var(--d) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:0.1;transform:scale(0.8)}100%{opacity:0.9;transform:scale(1.2)}}

/* ── Hero ── */
.hero{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 20px 40px;background:radial-gradient(ellipse at 50% 30%,rgba(123,47,247,0.18) 0%,rgba(7,4,15,0) 70%)}
.hero::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:200px;background:linear-gradient(to top,#07040f,transparent);pointer-events:none}

/* ── Animated crown logo ── */
.crown{font-size:72px;margin-bottom:8px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(255,215,0,0.5))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.relaunch-badge{display:inline-block;background:linear-gradient(135deg,#ffd700 0%,#ffaa00 50%,#ffd700 100%);background-size:200% 100%;animation:shimmer 3s linear infinite;color:#1a0a2e;padding:10px 32px;border-radius:50px;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:3px;margin-bottom:24px;box-shadow:0 0 30px rgba(255,215,0,0.4)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

h1{font-size:clamp(36px,7vw,72px);font-weight:900;line-height:1.08;margin-bottom:16px;background:linear-gradient(135deg,#ffffff 0%,#ffd700 40%,#ffffff 60%,#ffd700 100%);background-size:300% 100%;animation:textShimmer 4s ease-in-out infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes textShimmer{0%{background-position:100% 0}50%{background-position:0% 0}100%{background-position:100% 0}}

.tagline{font-size:clamp(16px,2.8vw,24px);color:#c4b5fd;max-width:640px;margin:0 auto 40px;line-height:1.7;font-weight:300}
.tagline strong{color:#ffd700;font-weight:700}

/* ── CTA Button ── */
.cta-btn{position:relative;display:inline-block;padding:20px 52px;font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:#1a0a2e;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);background-size:200% 100%;animation:shimmer 2s linear infinite;border:none;border-radius:60px;cursor:pointer;text-decoration:none;box-shadow:0 8px 32px rgba(255,215,0,0.4),0 0 60px rgba(255,215,0,0.15);transition:all 0.3s ease}
.cta-btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 40px rgba(255,215,0,0.5),0 0 80px rgba(255,215,0,0.2)}

/* ── Stats row ── */
.stats{display:flex;justify-content:center;gap:clamp(20px,5vw,60px);flex-wrap:wrap;margin:50px auto 0;max-width:700px}
.stat{text-align:center}
.stat-num{font-size:clamp(32px,5vw,52px);font-weight:900;background:linear-gradient(135deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:13px;color:#a0a0c0;text-transform:uppercase;letter-spacing:2px;margin-top:4px}

/* ── Features section ── */
.features{position:relative;z-index:1;padding:80px 20px;background:linear-gradient(180deg,#07040f 0%,#0f0820 50%,#07040f 100%)}
.features-title{text-align:center;font-size:clamp(24px,4vw,40px);font-weight:900;margin-bottom:12px;color:#fff}
.features-sub{text-align:center;font-size:16px;color:#a0a0c0;margin-bottom:50px;max-width:500px;margin-left:auto;margin-right:auto}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;max-width:960px;margin:0 auto}
.feature-card{background:linear-gradient(145deg,rgba(123,47,247,0.1),rgba(75,0,130,0.05));border:1px solid rgba(123,47,247,0.25);border-radius:20px;padding:32px 24px;text-align:center;transition:all 0.4s ease;position:relative;overflow:hidden}
.feature-card:hover{border-color:rgba(255,215,0,0.4);transform:translateY(-4px);box-shadow:0 12px 40px rgba(123,47,247,0.15)}

/* ── Testimonials & Footer ── */
.testimonials{position:relative;z-index:1;padding:80px 20px;background:#07040f}
.testi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:960px;margin:0 auto}
.footer{position:relative;z-index:1;padding:30px 20px;text-align:center;border-top:1px solid rgba(255,255,255,0.05);color:#606080;font-size:12px}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<section class="hero">
  <div class="crown">👑</div>
  <div class="relaunch-badge">✦ Official Relaunch ✦</div>
  <h1>FastListPro<br>Has Relaunched</h1>
  <p class="tagline">The safelist you loved is back — <strong>rebuilt from the ground up</strong> with powerful new tools, bigger rewards, and a community ready to help you <strong>grow your list faster than ever</strong>.</p>
  <button onclick="goToRegister()" class="cta-btn">🚀 Join Free — Claim Your Spot</button>
  <div class="stats">
    <div class="stat"><div class="stat-num">600+</div><div class="stat-label">Active Members</div></div>
    <div class="stat"><div class="stat-num">100%</div><div class="stat-label">Free to Join</div></div>
    <div class="stat"><div class="stat-num">$50+</div><div class="stat-label">Monthly Prizes</div></div>
  </div>
</section>

<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  let rid = urlParams.get('rid') || urlParams.get('id') || '2';
  
  if (rid === '1' || rid === '' || rid.toLowerCase() === 'admin') rid = '2';
  
  const signupUrl = "https://fastlistpro.com/auth?tab=signup&rid=" + encodeURIComponent(rid);
  
  const c = document.getElementById("stars");
  for(let i = 0; i < 80; i++) {
    const s = document.createElement("span");
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:-${Math.random()*4}s`;
    c.appendChild(s);
  }
  
  window.goToRegister = function() {
    window.location.assign(signupUrl);
  };
  
  document.querySelectorAll('a[href*="fastlistpro.com"], a[href="#REFURL#"]').forEach(link => {
    link.href = signupUrl;
  });
})();
</script>
</body>
</html>
